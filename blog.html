<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Blog Note</title>
    <link rel="icon" type="image/x-icon" href="static/assets/fubu.jpeg_webp" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="static/js/marked.min.js"></script>
</head>

<body>
    <nav class="header navbar navbar-light shadow-sm">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html#blog"><i class="bi bi-arrow-left"></i>&nbsp;Back to Home</a>
        </div>
    </nav>

    <section class="bg-gradient-primary-to-secondary-light mt5 md3" style="padding-top: 7rem; min-height: 100vh;">
        <div class="container px-5">
            <header>
                <h2 id="blog-note-title"><i class="bi bi-journal-richtext"></i>&nbsp;BLOG NOTE</h2>
            </header>
            <div class="main-body" id="blog-note-content"></div>
        </div>
    </section>

    <script>
        const posts = {
            hongkong: {
                title: 'My Year of Study in Hong Kong (Sept 2024 - Aug 2025)',
                file: 'contents/blog/hongkong/hongkong.md'
            },
            atlanta: {
                title: 'An Academic Journey in Atlanta, Georgia (Oct 2025)',
                file: 'contents/blog/atlanta/atlanta.md'
            },
            beihai: {
                title: 'A Trip to Beihai City (Dec 30, 2025 – Jan 3, 2026)',
                file: 'contents/blog/beihai/beihai.md'
            }
        };

        const postKey = new URLSearchParams(window.location.search).get('post');
        const post = posts[postKey];
        const titleEl = document.getElementById('blog-note-title');
        const contentEl = document.getElementById('blog-note-content');

        if (!post) {
            titleEl.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i>&nbsp;未找到该笔记';
            contentEl.innerHTML = '<p>链接参数无效，请返回首页 Blog 重新选择。</p>';
        } else {
            document.title = `${post.title} | Blog`;
            titleEl.innerHTML = `<i class="bi bi-journal-richtext"></i>&nbsp;${post.title}`;
            fetch(post.file)
                .then(response => response.text())
                .then(markdown => {
                    contentEl.innerHTML = marked.parse(markdown);
                })
                .catch(() => {
                    contentEl.innerHTML = '<p>内容加载失败，请稍后重试。</p>';
                });
        }
    </script>
</body>

</html>
